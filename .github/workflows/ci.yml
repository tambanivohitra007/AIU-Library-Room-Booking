name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  server:
    name: Server — type check
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: server/package-lock.json

      - name: Install dependencies
        run: npm ci
        working-directory: server

      - name: Generate Prisma client
        run: npx prisma generate
        working-directory: server
        env:
          DATABASE_URL: mysql://ci:ci@localhost:3306/ci

      - name: TypeScript type check
        run: npx tsc --noEmit
        working-directory: server

  client:
    name: Client — type check & build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: client/package-lock.json

      - name: Install dependencies
        run: npm ci
        working-directory: client

      - name: Build (includes type check)
        run: npm run build
        working-directory: client

  security:
    name: Security audit
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: server/package-lock.json

      - name: Install server dependencies
        run: npm ci
        working-directory: server

      - name: Audit server dependencies
        run: npm audit --production --audit-level=high
        working-directory: server

  deploy:
    name: Deploy to production
    runs-on: ubuntu-latest
    needs: [server, client, security]
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'
    steps:
      - name: Deploy via SSH
        uses: appleboy/ssh-action@v1
        with:
          host: ${{ secrets.SERVER_HOST }}
          username: ${{ secrets.SERVER_USER }}
          key: ${{ secrets.SSH_PRIVATE_KEY }}
          script: |
            set -e
            cd /var/www/aiu-library-booking

            git pull origin main

            cd server
            npm ci
            npx prisma migrate deploy
            npm run build

            cd ../client
            npm ci
            npm run build

            pm2 restart aiu-library-api
